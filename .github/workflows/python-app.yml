name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        PYTHONPATH=. pytest test/ -v --tb=short

  IMAGEM:
    name: Construindo Imagem no Docker
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Login no Docker
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PWD }}
    - name: Build e Publish DockerHub
      uses: docker/build-push-action@v5
      with:
        push: true
        tags: |
           livia2710/senai_api_tb:latest
           livia2710/senai_api_tb:${{github.sha}}
           
  DEPLOY:
    name: Implatando na EC2
    runs-on: ubuntu-latest
    needs: IMAGEM

    steps:
      - name: Deploy na EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USER}}
          key: ${{secrets.KEY}}
          script: |
             #fazer o pull da imagem dockerhub
             docker push Sabrinabreu/senai_api_tb:tagname
             #Parar o app atual e remover o container
             sudo docker stop senai_api_tb 2>/dev/null || true
             sudo docker rm senai_api_tb 2>/dev/null || true

             #publicar o novo container
             sudo docker run --name senai_api_tb -d --restart unless-stopped -p 80:8000 Sabrinabreu/senai_api_tb:tagname

             #Verificar se publicou
             sleep 5
             curl -f http://localhost:80/health || exit 1
             echo "Deploy feito com sucesso!"
